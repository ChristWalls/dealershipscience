<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealership Science | EV Savings Calculator</title>

<style>
body{margin:0;font-family:Arial;background:#f8fafc;color:#0f172a}
.wrap{max-width:1100px;margin:auto;padding:20px}
.brand{display:flex;align-items:center;gap:15px;margin-bottom:20px}
.brand img{height:70px}
.shell{background:#fff;border-radius:20px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin-bottom:10px}
.panel{background:#0f172a;color:#fff;padding:20px;border-radius:16px}
.big{font-size:36px;font-weight:900}
.btn{background:#ff5a1f;color:#fff;border:none;padding:14px;border-radius:12px;font-weight:800;width:100%;cursor:pointer}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="wrap">

<div class="brand">
<img src="logo.png">
<div>
<div style="font-weight:800;">Dealership Science</div>
<div style="font-size:13px;color:#64748b;">Measure. Optimize. Sell More.</div>
</div>
</div>

<div class="shell">
<div class="grid">

<div>
<h2>EV Fuel Savings Calculator</h2>

<input id="spend" type="number" value="75" placeholder="Weekly Gas Spend">
<input id="gas" type="number" value="3.29" step="0.01" placeholder="Gas Price">
<input id="mpg" type="number" value="25" placeholder="MPG">
<input id="rate" type="number" value="0.09" step="0.01" placeholder="Electric Rate">
<input id="eff" type="number" value="0.30" step="0.01" placeholder="EV Efficiency">
</div>

<div>
<div class="panel">
<div>Weekly Savings</div>
<div class="big" id="weekly">$0</div>
<div id="monthly"></div>
<div id="yearly"></div>
</div>

<form action="https://formsubmit.co/chris@dealershipscience.com" method="POST">
<input type="hidden" name="_subject" value="New EV Lead">
<input type="hidden" name="_captcha" value="false">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Phone" required>
<input name="email" placeholder="Email" required>

<button class="btn">Get My EV Savings Plan</button>
</form>

</div>

</div>
</div>

</div>

<script>
function calc(){
let spend=parseFloat(document.getElementById('spend').value)||0;
let gas=parseFloat(document.getElementById('gas').value)||0;
let mpg=parseFloat(document.getElementById('mpg').value)||1;
let rate=parseFloat(document.getElementById('rate').value)||0;
let eff=parseFloat(document.getElementById('eff').value)||0;

let miles=(spend/gas)*mpg;
let evCost=miles*eff*rate;
let save=spend-evCost;

document.getElementById('weekly').innerText="$"+save.toFixed(2);
document.getElementById('monthly').innerText="Monthly: $"+(save*4.33).toFixed(2);
document.getElementById('yearly').innerText="Yearly: $"+(save*52).toFixed(2);
}
document.querySelectorAll("input").forEach(i=>i.addEventListener("input",calc));
calc();
</script>

</body>
</html>
