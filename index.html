<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Savings Calculator</title>
<style>
body {font-family: Arial; margin:0; padding:0; background:#f5f5f5;}
.container {max-width:800px; margin:20px auto; background:white; padding:20px; border-radius:10px;}
h1 {text-align:center;}
input, button {width:100%; padding:10px; margin:5px 0;}
.result {font-size:20px; font-weight:bold; margin-top:10px;}
.footer {font-size:12px; margin-top:20px; color:#555;}
.banner {padding:10px; text-align:center; font-weight:bold;}
</style>
</head>
<body>

<div class="banner" id="banner"></div>

<div class="container">
<h1 id="headline">EV Savings Calculator</h1>

<label>Weekly Gas Spend ($)</label>
<input type="number" id="gasSpend" value="75">

<label>Gas Price ($/gal)</label>
<input type="number" id="gasPrice" value="3.29">

<label>Miles Per Gallon</label>
<input type="number" id="mpg" value="25">

<label>Electric Rate ($/kWh)</label>
<input type="number" id="electricRate" value="0.09">

<label>EV Efficiency (kWh per mile)</label>
<input type="number" id="efficiency" value="0.30">

<button onclick="calculate()">Calculate Savings</button>

<div class="result" id="result"></div>

</div>

<div class="container footer" id="footer"></div>

<script>
// Dealer Config (can be replaced dynamically)
const config = {
  dealer_name: "Your Dealership",
  phone: "000-000-0000",
  website: "#",
  banner_text: "⚡ See How Much You Could Save Switching to Electric",
  primary_color: "#003366"
};

document.getElementById("banner").innerText = config.banner_text;
document.getElementById("banner").style.background = config.primary_color;
document.getElementById("banner").style.color = "#fff";

document.getElementById("headline").innerText = config.dealer_name + " EV Savings Calculator";

function calculate(){
  let gasSpend = parseFloat(document.getElementById("gasSpend").value);
  let gasPrice = parseFloat(document.getElementById("gasPrice").value);
  let mpg = parseFloat(document.getElementById("mpg").value);
  let electricRate = parseFloat(document.getElementById("electricRate").value);
  let efficiency = parseFloat(document.getElementById("efficiency").value);

  let miles = (gasSpend / gasPrice) * mpg;
  let evCost = miles * efficiency * electricRate;
  let savings = gasSpend - evCost;

  document.getElementById("result").innerHTML =
    "Weekly Savings: $" + savings.toFixed(2) +
    "<br>Monthly: $" + (savings*4.33).toFixed(2) +
    "<br>Yearly: $" + (savings*52).toFixed(2);
}

// Footer with disclaimers
document.getElementById("footer").innerHTML = `
<strong>${config.dealer_name}</strong><br>
Phone: ${config.phone}<br>
Website: ${config.website}<br><br>

<strong>Estimated Savings Disclaimer:</strong>
Savings are estimates based on user input and may vary.<br><br>

<strong>Electric Vehicle Efficiency:</strong>
Typical range 0.25–0.35 kWh per mile.<br><br>

<strong>Fuel Price Assumptions:</strong>
Gas prices may vary.<br><br>

<strong>Electricity Cost Assumptions:</strong>
Rates vary by provider and usage.<br><br>

<strong>No Offer or Guarantee:</strong>
Not an offer to sell or guarantee pricing.<br><br>

<strong>Incentives & Tax Credits:</strong>
Subject to eligibility and change.<br><br>

<strong>Consent to Contact:</strong>
By submitting, you agree to be contacted.<br><br>

<strong>Data Usage:</strong>
Information may be shared with dealership partners.<br><br>

<strong>Limitation of Liability:</strong>
Not responsible for decisions based on estimates.
`;
</script>

</body>
</html>
